# Perfil produccion — activar con: SPRING_PROFILE=prod

spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.com.gestortareas=INFO

# ── Base de datos ─────────────────────────────────────────────────────────────
# Crear usuario dedicado MySQL (NUNCA usar root en prod):
#   CREATE USER 'gestor_app'@'localhost' IDENTIFIED BY '<password_fuerte>';
#   GRANT SELECT,INSERT,UPDATE,DELETE ON tareas_bd.* TO 'gestor_app'@'localhost';
# Luego configurar:
#   DB_USERNAME=gestor_app
#   DB_PASSWORD=<password_fuerte>
#   DB_URL=jdbc:mysql://localhost:3306/tareas_bd?useSSL=true&requireSSL=true

# ── SSL / HTTPS ───────────────────────────────────────────────────────────────
# 1. Generar certificado:  keytool -genkeypair -alias gestor -keyalg RSA
#                          -keysize 2048 -storetype PKCS12
#                          -keystore gestor.p12 -validity 3650
#    O usar Let's Encrypt via Certbot.
# 2. Descomentar cuando el certificado esté disponible:
# server.ssl.enabled=true
# server.ssl.key-store=${SSL_KEYSTORE_PATH}
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=gestor
# server.port=443

# ── Security headers ──────────────────────────────────────────────────────────
# Activar cuando SSL esté configurado:
security.require-https=false
security.hsts.enabled=false
# → Cambiar ambos a true cuando SSL esté activo
