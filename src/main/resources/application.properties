# Perfil activo — cambiar a 'prod' en produccion (export SPRING_PROFILE=prod)
spring.profiles.active=${SPRING_PROFILE:dev}

# Base de datos — Railway/Hostinger inyectan variables automaticamente
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:tareas_bd}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT — cambiar JWT_SECRET por una clave aleatoria de ≥32 chars en producción
jwt.secret=${JWT_SECRET:ZmludGFza0p3dFNlY3JldEtleUZvckdlc3RvclRhcmVhczIwMjY=}

# Groq — agente IA (vacío deshabilita las llamadas a la API)
groq.api.key=${GROQ_API_KEY:}

# Seguridad: no exponer detalles internos al cliente
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# VAPID — notificaciones push
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}

# Puerto — Railway inyecta $PORT automáticamente
server.port=${PORT:8080}

# URL del frontend — configurar en Railway con la URL de Vercel
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Email — configurar con credenciales SMTP para recuperación de contraseña
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Límites de tamaño de request
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

# Pool de conexiones — reducido para ambientes con poca RAM
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
