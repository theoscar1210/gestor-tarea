# Perfil activo — cambiar a 'prod' en produccion (export SPRING_PROFILE=prod)
spring.profiles.active=${SPRING_PROFILE:dev}

# Base de datos — sobreescribir con variables de entorno en produccion
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tareas_bd}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# API Keys — definir las variables de entorno antes de arrancar la app
# Export GROQ_API_KEY=gsk_... y ANTHROPIC_API_KEY=sk-ant-...
groq.api.key=${GROQ_API_KEY:}
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Credenciales HTTP Basic — cambiar via variables de entorno antes de desplegar
spring.security.user.name=${APP_USERNAME:admin}
spring.security.user.password=${APP_PASSWORD:gestor2026}

# Seguridad: no exponer detalles internos al cliente
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Límites de tamaño de request
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB
