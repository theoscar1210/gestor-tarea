# Perfil activo — cambiar a 'prod' en produccion (export SPRING_PROFILE=prod)
spring.profiles.active=${SPRING_PROFILE:dev}

# Base de datos — Railway inyecta MYSQLHOST/PORT/DATABASE/USER/PASSWORD automaticamente
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:tareas_bd}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# API Keys — definir las variables de entorno antes de arrancar la app
# Export GROQ_API_KEY=gsk_... y ANTHROPIC_API_KEY=sk-ant-...
groq.api.key=${GROQ_API_KEY:}
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Credenciales HTTP Basic — cambiar via variables de entorno antes de desplegar
spring.security.user.name=${APP_USERNAME:admin}
spring.security.user.password=${APP_PASSWORD:gestor2026}

# Seguridad: no exponer detalles internos al cliente
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# VAPID — notificaciones push
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}

# Puerto — Railway inyecta $PORT automáticamente
server.port=${PORT:8080}

# URL del frontend — configurar en Railway con la URL de Vercel
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Límites de tamaño de request
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

# Pool de conexiones — reducido para ambientes con poca RAM (Railway free tier)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
